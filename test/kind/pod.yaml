---
apiVersion: v1
kind: Pod
metadata:
  name: nginx1
  annotations:
    quota.scheduling.kaschnit.github.io/queue: "tenant-a"
spec:
  schedulerName: custom-scheduler
  priorityClassName: "high"
  containers:
  - name: nginx
    image: nginx:1.14.2
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 3
        memory: 1Gi
      limits:
        cpu: 5
        memory: 1Gi
